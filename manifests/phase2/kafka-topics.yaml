# ============================================================
# Kafka Topics สำหรับ OT Data Pipeline
# ============================================================

# Topic หลัก — รับข้อมูลจาก OPC via NIFI Edge
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: opc-raw-data
  namespace: dmz
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: 604800000      # เก็บ 7 วัน
    segment.bytes: 536870912     # 512MB per segment

