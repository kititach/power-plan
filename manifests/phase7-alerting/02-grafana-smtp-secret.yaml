# SMTP credentials สำหรับ Grafana
# ตอนนี้ใช้ mailhog (ไม่ต้อง auth)
# เมื่อพร้อมใช้จริง — แก้ host, user, password ที่นี่ แล้ว restart Grafana
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-smtp
  namespace: it
type: Opaque
stringData:
  # Mailhog mode (ค่า default — ทดสอบได้เลย)
  smtp-host: "mailhog.it.svc.cluster.local:1025"
  smtp-user: ""
  smtp-password: ""
  smtp-from-address: "grafana-alert@k3s.local"
  smtp-from-name: "k3s Alert"
  smtp-skip-verify: "true"
  smtp-starttls-policy: "OpportunisticStartTLS"
  # Recipient — แก้เป็นอีเมลจริงตอนใช้งานจริง
  alert-recipient: "ops@k3s.local"

  # ─── Production SMTP examples (uncomment + แก้ตอนใช้จริง) ───
  # Gmail (ต้องมี App Password — myaccount.google.com/apppasswords)
  # smtp-host: "smtp.gmail.com:587"
  # smtp-user: "your-email@gmail.com"
  # smtp-password: "xxxx-xxxx-xxxx-xxxx"   # App Password (ไม่ใช่ password ปกติ)
  # smtp-from-address: "your-email@gmail.com"
  # smtp-skip-verify: "false"
  # smtp-starttls-policy: "MandatoryStartTLS"
  # alert-recipient: "you@gmail.com"

  # Office 365
  # smtp-host: "smtp.office365.com:587"
  # smtp-user: "your-email@company.com"
  # smtp-password: "<password>"
