# Mailhog — Mock SMTP server สำหรับทดสอบ alert ก่อนตั้ง SMTP จริง
# SMTP port: 1025 (in-cluster เท่านั้น)
# Web UI:    http://10.85.3.104:30825 (ดูเมลที่ส่งเข้ามา)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: it
  labels:
    app: mailhog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          ports:
            - name: smtp
              containerPort: 1025
            - name: http
              containerPort: 8025
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: it
  labels:
    app: mailhog
spec:
  type: ClusterIP
  selector:
    app: mailhog
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog-ui
  namespace: it
  labels:
    app: mailhog
spec:
  type: NodePort
  selector:
    app: mailhog
  ports:
    - name: http
      port: 8025
      targetPort: 8025
      nodePort: 30825
