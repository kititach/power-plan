apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino
  namespace: it
  labels:
    app: trino
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trino
  template:
    metadata:
      labels:
        app: trino
    spec:
      containers:
        - name: trino
          image: trinodb/trino:463
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
          volumeMounts:
            - name: config
              mountPath: /etc/trino/config.properties
              subPath: config.properties
            - name: config
              mountPath: /etc/trino/node.properties
              subPath: node.properties
            - name: config
              mountPath: /etc/trino/jvm.config
              subPath: jvm.config
            - name: config
              mountPath: /etc/trino/log.properties
              subPath: log.properties
            - name: config
              mountPath: /etc/trino/catalog/minio.properties
              subPath: minio.properties
            - name: data
              mountPath: /data/trino
          resources:
            requests:
              memory: 2Gi
              cpu: "1"
            limits:
              memory: 4Gi
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /v1/info
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/info
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: trino-config
        - name: data
          persistentVolumeClaim:
            claimName: pvc-trino
---
apiVersion: v1
kind: Service
metadata:
  name: trino
  namespace: it
  labels:
    app: trino
spec:
  type: NodePort
  selector:
    app: trino
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30800
