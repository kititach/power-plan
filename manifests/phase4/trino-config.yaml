apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-config
  namespace: it
data:
  config.properties: |
    coordinator=true
    node-scheduler.include-coordinator=true
    http-server.http.port=8080
    discovery.uri=http://trino.it.svc.cluster.local:8080

  node.properties: |
    node.environment=production
    node.id=trino-mintpower-01
    node.data-dir=/data/trino

  jvm.config: |
    -server
    -Xmx4G
    -XX:InitialRAMPercentage=80
    -XX:MaxRAMPercentage=80
    -XX:G1HeapRegionSize=32M
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:+UseG1GC
    -XX:ReservedCodeCacheSize=512M
    -Djdk.attach.allowAttachSelf=true
    -Djdk.nio.maxCachedBufferSize=2000000

  log.properties: |
    io.trino=INFO

  minio.properties: |
    connector.name=hive
    hive.metastore=file
    hive.metastore.catalog.dir=s3://opc-raw/metadata/
    fs.native-s3.enabled=true
    s3.endpoint=http://minio.it.svc.cluster.local:9000
    s3.aws-access-key=CHANGE_ME
    s3.aws-secret-key=CHANGE_ME
    s3.path-style-access=true
    s3.region=us-east-1
    hive.non-managed-table-writes-enabled=true
