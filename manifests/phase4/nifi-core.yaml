apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi-core
  namespace: it
  labels:
    app: nifi-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi-core
  template:
    metadata:
      labels:
        app: nifi-core
    spec:
      containers:
        - name: nifi
          image: apache/nifi:2.0.0
          ports:
            - name: https
              containerPort: 8443
          env:
            - name: SINGLE_USER_CREDENTIALS_USERNAME
              value: "admin"
            - name: SINGLE_USER_CREDENTIALS_PASSWORD
              value: "Nifi@mintpower2024!"
            - name: NIFI_JVM_HEAP_INIT
              value: "2g"
            - name: NIFI_JVM_HEAP_MAX
              value: "4g"
            - name: NIFI_WEB_PROXY_HOST
              value: "10.85.3.104:31443"
            - name: MINIO_ENDPOINT
              value: "http://minio.it.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
            - name: KAFKA_BOOTSTRAP
              value: "kafka-cluster-kafka-bootstrap.dmz.svc.cluster.local:9092"
          volumeMounts:
            - name: data
              mountPath: /opt/nifi/nifi-current/data
          resources:
            requests:
              memory: 2Gi
              cpu: "1"
            limits:
              memory: 4Gi
              cpu: "2"
          # ใช้ TCPSocket เพราะ NIFI 2.0.0 ปฏิเสธ HTTP probe ที่ไม่มี Host header ถูกต้อง
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-nifi-core
---
apiVersion: v1
kind: Service
metadata:
  name: nifi-core
  namespace: it
  labels:
    app: nifi-core
spec:
  type: NodePort
  selector:
    app: nifi-core
  ports:
    - name: https
      port: 8443
      targetPort: 8443
      nodePort: 31443
