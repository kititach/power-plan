# ============================================================
# PersistentVolumes — NVMe Storage on mintpower
# ============================================================

# --- Kafka (50Gi) ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-kafka
  labels:
    app: kafka
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-nvme
  local:
    path: /mnt/nvme-storage/k8s-pv/kafka
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - mintpower

