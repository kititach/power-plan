apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-config
  namespace: it
data:
  telegraf.conf: |
    [agent]
      interval = "10s"
      round_interval = true
      metric_batch_size = 5000
      metric_buffer_limit = 50000
      flush_interval = "30s"
      hostname = "telegraf-mintpower"
      omit_hostname = false

    [[inputs.kafka_consumer]]
      brokers = ["kafka-cluster-kafka-bootstrap.dmz.svc.cluster.local:9092"]
      topics = ["opc-metrics"]
      consumer_group = "telegraf-opc-consumer"
      offset = "newest"
      data_format = "json"
      json_time_key = "timestamp"
      json_time_format = "2006-01-02T15:04:05.999999999Z07:00"
      name_override = "opc_data"

    [[inputs.cpu]]
      percpu = false
      totalcpu = true

    [[inputs.mem]]

    [[outputs.influxdb_v2]]
      urls = ["http://influxdb.it.svc.cluster.local:8086"]
      token = "${INFLUXDB_TOKEN}"
      organization = "${INFLUXDB_ORG}"
      bucket = "${INFLUXDB_BUCKET}"
      timeout = "5s"
