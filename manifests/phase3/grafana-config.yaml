# ============================================================
# Grafana — Auto-provision InfluxDB datasource
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: it
data:
  influxdb.yaml: |
    apiVersion: 1
    datasources:
      - name: InfluxDB-OPC
        uid: influxdb-opc
        type: influxdb
        access: proxy
        url: http://influxdb.it.svc.cluster.local:8086
        jsonData:
          version: Flux
          organization: mintpower-org
          defaultBucket: opc-data
          tlsSkipVerify: true
        secureJsonData:
          token: CHANGE_ME
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-ini
  namespace: it
data:
  grafana.ini: |
    [server]
    domain = <K3S_NODE_IP>
    root_url = http://<K3S_NODE_IP>:30300

    [security]
    admin_user = admin
    admin_password = CHANGE_ME

    [auth.anonymous]
    enabled = false
