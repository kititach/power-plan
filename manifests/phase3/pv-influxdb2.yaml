apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-influxdb2
  labels:
    app: influxdb
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-nvme
  local:
    path: /mnt/nvme-storage/k8s-pv/influxdb2
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - mintpower
