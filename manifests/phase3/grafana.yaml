apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: it
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_PATHS_CONFIG
              value: /etc/grafana/grafana.ini
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin2026"
            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-secret
                  key: admin-token
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    for i in $(seq 1 30); do
                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
                      [ "$STATUS" = "200" ] && break
                      sleep 3
                    done
                    curl -s -u "admin:admin2026" \
                      -X PUT -H "Content-Type: application/json" \
                      -d "{\"id\":1,\"uid\":\"influxdb-opc\",\"name\":\"InfluxDB-OPC\",\"type\":\"influxdb\",\"access\":\"proxy\",\"url\":\"http://influxdb.it.svc.cluster.local:8086\",\"jsonData\":{\"version\":\"Flux\",\"organization\":\"mintpower-org\",\"defaultBucket\":\"opc-data\",\"tlsSkipVerify\":true},\"secureJsonData\":{\"token\":\"${INFLUX_TOKEN}\"},\"isDefault\":true}" \
                      "http://localhost:3000/api/datasources/1" || true
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: grafana-ini
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provisioner
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /etc/grafana/dashboards
          resources:
            requests:
              memory: 512Mi
              cpu: "0.5"
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-grafana
        - name: grafana-ini
          configMap:
            name: grafana-ini
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provisioner
          configMap:
            name: grafana-dashboard-provisioner
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: it
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
