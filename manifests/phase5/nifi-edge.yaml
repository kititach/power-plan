# ============================================================
# NIFI Edge — รับข้อมูลจาก OPC Simulator ส่งไป Kafka
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi-edge
  namespace: it
  labels:
    app: nifi-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi-edge
  template:
    metadata:
      labels:
        app: nifi-edge
    spec:
      containers:
        - name: nifi
          image: apache/nifi:2.0.0
          ports:
            - name: https
              containerPort: 8443
          env:
            - name: SINGLE_USER_CREDENTIALS_USERNAME
              value: "admin"
            - name: SINGLE_USER_CREDENTIALS_PASSWORD
              value: "CHANGE_ME"
            - name: NIFI_JVM_HEAP_INIT
              value: "1g"
            - name: NIFI_JVM_HEAP_MAX
              value: "2g"
            - name: NIFI_WEB_PROXY_HOST
              value: "<K3S_NODE_IP>:31444"
            # OPC Simulator address
            - name: OPC_SERVER_HOST
              value: "<OPC_SERVER_IP>"
            # Kafka External address (NIFI Edge อยู่ใน cluster เดียวกัน)
            - name: KAFKA_BOOTSTRAP
              value: "kafka-cluster-kafka-bootstrap.dmz.svc.cluster.local:9092"
          volumeMounts:
            - name: data
              mountPath: /opt/nifi/nifi-current/data
          resources:
            requests:
              memory: 1Gi
              cpu: "0.5"
            limits:
              memory: 2Gi
              cpu: "1"
          # TCPSocket probe เหมือน NIFI Core
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-nifi-edge
---
apiVersion: v1
kind: Service
metadata:
  name: nifi-edge
  namespace: it
  labels:
    app: nifi-edge
spec:
  type: NodePort
  selector:
    app: nifi-edge
  ports:
    - name: https
      port: 8443
      targetPort: 8443
      nodePort: 31444
