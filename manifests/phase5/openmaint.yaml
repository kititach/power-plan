apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmaint
  namespace: it
  labels:
    app: openmaint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openmaint
  template:
    metadata:
      labels:
        app: openmaint
    spec:
      containers:
        - name: openmaint
          image: itmicus/cmdbuild:om-2.3-3.4.1-d
          command: ["/bin/bash", "-c"]
          args:
            - |
              trap 'pkill -f "org.apache.catalina" 2>/dev/null; exit 0' SIGTERM SIGINT
              /usr/local/bin/docker-entrypoint.sh &
              while true; do
                sleep 15
                pgrep -f "org.apache.catalina" > /dev/null && continue
                sleep 10
                pgrep -f "org.apache.catalina" > /dev/null || exit 1
              done
          ports:
            - containerPort: 8080
          env:
            - name: CMDBUILD_DUMP
              value: "demo.dump.xz"
            - name: POSTGRES_HOST
              value: "postgres-openmaint"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "openmaint"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASS
              value: "postgres"
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1536m"
          resources:
            requests:
              memory: 1Gi
              cpu: "0.5"
            limits:
              memory: 2Gi
              cpu: "1"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: openmaint
  namespace: it
  labels:
    app: openmaint
spec:
  type: NodePort
  selector:
    app: openmaint
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30885
